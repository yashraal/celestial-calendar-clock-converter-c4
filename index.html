<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial Calendar Converter</title>

    <!-- STYLES -->
    <style>
        :root {
            --primary-gold: #e6c47a;
            --secondary-blue: #1a2a3a;
            --dark-bg: #0f1519;
            --text-light: #f0f0f0;
            --accent-green: #4caf50;
            --accent-blue: #64b5f6;
            --alert-red: #ff6b6b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            overflow-x: hidden;
        }

        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            z-index: -1;
            opacity: 0.5;
        }

        header {
            text-align: center;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid var(--primary-gold);
            position: relative;
        }

        h1, h2 {
            font-family: 'Cinzel', serif; 
            color: var(--primary-gold);
            margin: 0;
        }

        .subtitle { font-style: italic; opacity: 0.8; font-size: 0.9rem; margin-bottom: 1rem; display: block; }

        /* Language Bar */
        .lang-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .lang-btn:hover, .lang-btn.active {
            background: var(--primary-gold);
            color: var(--dark-bg);
        }

        /* Google Translate Customization */
        .goog-te-banner-frame { display: none !important; }
        body { top: 0px !important; }
        .goog-te-gadget { font-family: 'Lato', sans-serif !important; }
        .goog-te-gadget-simple { background-color: rgba(0,0,0,0) !important; border: 1px solid var(--primary-gold) !important; border-radius: 4px; padding: 4px !important; }
        .goog-te-menu-value span { color: var(--primary-gold) !important; }
        
        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 1rem;
            display: grid;
            gap: 2rem;
        }

        .card {
            background: rgba(26, 42, 58, 0.9);
            border: 1px solid var(--primary-gold);
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        input[type="date"], select {
            padding: 0.5rem;
            border: 1px solid var(--primary-gold);
            background: #fff;
            color: #000;
            font-family: monospace;
            border-radius: 4px;
        }

        button {
            padding: 0.6rem 1.5rem;
            background: var(--accent-green);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.05); }

        .result-box {
            background: #000;
            border-left: 4px solid var(--primary-gold);
            padding: 1.5rem;
            margin-top: 1rem;
            text-align: center;
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .highlight { color: var(--primary-gold); font-weight: bold; }
        
        /* Alert Styles */
        .alert-title { font-weight: bold; font-size: 1.3rem; display: block; margin-bottom: 0.5rem; }
        .text-red { color: var(--alert-red); }
        .text-green { color: var(--accent-green); }
        .text-blue { color: var(--accent-blue); }
        .status-subtitle { font-size: 0.9rem; color: #aaa; font-style: italic; }
        .status-subtitle-red { font-size: 0.9rem; color: var(--alert-red); font-style: italic; }

        /* --- TABLE STYLES --- */
        .feast-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            direction: rtl;
        }

        .feast-table td {
            padding: 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            vertical-align: top;
        }

        .col-past { width: 50%; text-align: left; border-left: 1px solid rgba(255,255,255,0.1); }
        .col-future { width: 50%; text-align: right; color: var(--accent-blue); font-weight: bold; }

        .feast-row-header {
            background: rgba(0,0,0,0.3);
            text-align: center;
            font-family: 'Cinzel', serif;
            color: var(--primary-gold);
            font-size: 1.1rem;
        }

        .feast-row-info { text-align: center; font-size: 0.8rem; color: #aaa; background: rgba(0,0,0,0.1); }
        
        .label-past, .label-future, .date-text { direction: ltr; display: inline-block; }
        .label-past { font-size: 0.8rem; color: #888; display: block; margin-bottom: 0.2rem; }
        .label-future { font-size: 0.8rem; color: #aaa; display: block; margin-bottom: 0.2rem; }
        
        .mandatory-status { color: var(--alert-red); font-weight: bold; }
        .memorial-status { color: #888; font-style: italic; }
        
        .year-display {
            text-align: center;
            font-size: 1.5rem;
            color: var(--primary-gold);
            margin-bottom: 1rem;
            font-family: 'Cinzel', serif;
        }

        /* Age Calculator Specifics */
        .age-result-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .age-label { color: #aaa; }
        .age-value { color: var(--primary-gold); font-weight: bold; font-family: 'Cinzel', serif; font-size: 1.1rem; }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            color: #888;
            border-top: 1px solid #333;
            margin-top: 2rem;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
</head>

    <div class="stars"></div>

    <header>
        <h1 id="title">Celestial Calendar Converter</h1>
        <p class="subtitle" id="subtitle">According to the logic of the Three Witnesses (Sun, Moon, & Stars/Abib)</p>
        
        <!-- Language Selector -->
        <div class="lang-bar">
            <button class="lang-btn" onclick="changeLanguage('en')">English</button>
            <button class="lang-btn" onclick="changeLanguage('pt')">Português</button>
            <button class="lang-btn" onclick="changeLanguage('es')">Español</button>
            <button class="lang-btn" onclick="changeLanguage('de')">Deutsch</button>
            <button class="lang-btn" onclick="changeLanguage('fr')">Français</button>
            <button class="lang-btn" onclick="changeLanguage('it')">Italiano</button>
            <button class="lang-btn" onclick="changeLanguage('he')">עברית</button>
            <button class="lang-btn" onclick="changeLanguage('ar')">العربية</button>
            <button class="lang-btn" onclick="changeLanguage('ru')">Русский</button>
            <button class="lang-btn" onclick="changeLanguage('zh')">中文</button>
            <button class="lang-btn" onclick="changeLanguage('ja')">日本語</button>
            <button class="lang-btn" onclick="changeLanguage('ko')">한국어</button>
            <button class="lang-btn" onclick="changeLanguage('sw')">Swahili</button>
            <button class="lang-btn" onclick="changeLanguage('yo')">Yorùbá</button>
            
            <!-- Google Translate for all other languages -->
            <div id="google_translate_element" style="display:inline-block;"></div>
        </div>
    </header>

    <main class="container">
        
        <!-- Converter Section -->
        <section class="card converter-card">
            <h2 id="conv-title">Date Converter</h2>
            <div class="input-group">
                <label for="gregorian-date" id="lbl-greg-date">Enter Pagan (Gregorian) Date:</label>
                <input type="date" id="gregorian-date">
                <button id="btn-calculate" onclick="convertDate()">Calculate</button>
            </div>
            
            <div id="result-display" class="result-box">
                <p>Initializing...</p>
            </div>
        </section>

        <!-- Age Calculator Section -->
        <section class="card converter-card">
            <h2 id="age-title">Scriptural Age Calculator</h2>
            <div class="input-group">
                <label for="birth-date" id="lbl-birth-date">Enter Your Pagan Birth Date:</label>
                <input type="date" id="birth-date">
                <button id="btn-calc-age" onclick="calculateAge()">Calculate Age</button>
            </div>
            
            <div id="age-result-display" class="result-box">
                <p id="init-age-msg">Enter your birth date to see your Scriptural Age.</p>
            </div>
        </section>

        <!-- Feasts Section -->
        <section class="card feasts-card">
            <div class="input-group" style="margin-bottom: 1rem; border-bottom: 1px solid #333; padding-bottom: 1rem;">
                <h2 style="margin: 0;" id="feasts-title">Feasts Timeline</h2>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <label for="year-select" id="lbl-ref-year">Reference Year:</label>
                    <select id="year-select" onchange="calculateFeastsForYear()">
                        <!-- Options populated by JS -->
                    </select>
                </div>
            </div>

            <div id="feast-year-header" class="year-display">
                <!-- Year Header -->
            </div>

            <table class="feast-table" id="feast-table-container">
                <!-- Table populated by JS -->
            </table>
        </section>

    </main>

    <footer>
        <p id="footer-verse">"And Elohim said..."</p>
    </footer>

        let currentLang = 'en';

        function changeLanguage(lang) {
            currentLang = lang;
            
            // Reset Google Translate if using manual buttons
            if (window.google && window.google.translate) {
                var select = document.querySelector('.goog-te-combo');
                if (select) select.value = '';
            }

            // Set Direction for Hebrew and Arabic
            if (lang === 'he' || lang === 'ar') {
                document.body.style.direction = 'rtl';
                document.body.style.fontFamily = "'Lato', sans-serif"; 
            } else {
                document.body.style.direction = 'ltr';
            }

            // Update content
            if (translations[lang]) {
                const T = translations[lang];
                document.getElementById('title').innerText = T.title;
                document.getElementById('subtitle').innerText = T.subtitle;
                document.getElementById('conv-title').innerText = T.conv_title;
                document.getElementById('lbl-greg-date').innerText = T.lbl_greg_date;
                document.getElementById('btn-calculate').innerText = T.btn_calculate;
                document.getElementById('age-title').innerText = T.age_title;
                document.getElementById('lbl-birth-date').innerText = T.lbl_birth_date;
                document.getElementById('btn-calc-age').innerText = T.btn_calc_age;
                document.getElementById('init-age-msg').innerText = T.init_age_msg;
                document.getElementById('feasts-title').innerText = T.feasts_title;
                document.getElementById('lbl-ref-year').innerText = T.lbl_ref_year;
                document.getElementById('footer-verse').innerText = T.footer;
                
                // Re-run dynamic displays
                convertDate();
                calculateFeastsForYear();
            }
        }

        // --- CORE LOGIC ---
        const ANCHOR_YEAR_6000 = new Date(2025, 3, 13, 12, 0, 0); 
        const ANCHOR_YEAR_6001 = new Date(2026, 4, 2, 12, 0, 0);  

        function isLeapYear(scriptYear) {
            if (scriptYear === 6000) return true;
            if (scriptYear === 6001) return false;
            let diff = scriptYear - 6000;
            if (diff % 3 === 0) return true;
            return false;
        }

        function getMonthLength(monthIndex, year) {
            if (monthIndex === 13) return 29; 
            return (monthIndex % 2 === 1) ? 30 : 29;
        }

        function getYearStartDate(scriptYear) {
            if (scriptYear === 6000) return new Date(ANCHOR_YEAR_6000);
            if (scriptYear === 6001) return new Date(ANCHOR_YEAR_6001);
            
            let startDate = new Date(ANCHOR_YEAR_6000);
            let currentYear = 6000;
            
            if (scriptYear > 6000) {
                while (currentYear < scriptYear) {
                    let daysInYear = 0;
                    let maxM = isLeapYear(currentYear) ? 13 : 12;
                    for(let m=1; m<=maxM; m++) daysInYear += getMonthLength(m, currentYear);
                    startDate.setDate(startDate.getDate() + daysInYear);
                    currentYear++;
                }
            } else {
                while (currentYear > scriptYear) {
                    currentYear--;
                    let daysInYear = 0;
                    let maxM = isLeapYear(currentYear) ? 13 : 12;
                    for(let m=1; m<=maxM; m++) daysInYear += getMonthLength(m, currentYear);
                    startDate.setDate(startDate.getDate() - daysInYear);
                }
            }
            startDate.setHours(12,0,0,0);
            return startDate;
        }

        function getScripturalDate(gregorianDateObj) {
            let inputDate = new Date(gregorianDateObj);
            inputDate.setHours(12,0,0,0); 

            const epoch = ANCHOR_YEAR_6000;
            const diffTime = inputDate - epoch;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            let estimatedYear = 6000 + Math.floor(diffDays / 354.367);

            let yearStart = getYearStartDate(estimatedYear);
            
            while (inputDate < yearStart) {
                estimatedYear--;
                yearStart = getYearStartDate(estimatedYear);
            }
            
            let nextYearStart = getYearStartDate(estimatedYear + 1);
            while (inputDate >= nextYearStart) {
                estimatedYear++;
                yearStart = nextYearStart;
                nextYearStart = getYearStartDate(estimatedYear + 1);
            }

            let daysRemaining = Math.floor((inputDate - yearStart) / (1000 * 60 * 60 * 24));
            let monthIndex = 1;
            let dayCount = 1;
            let maxMonths = isLeapYear(estimatedYear) ? 13 : 12;
            
            while (monthIndex <= maxMonths) {
                let mLen = getMonthLength(monthIndex, estimatedYear);
                
                if (daysRemaining < mLen) {
                    dayCount = daysRemaining + 1;
                    break;
                }
                
                daysRemaining -= mLen;
                monthIndex++;
            }

            const isNewMoon = (dayCount === 1);
            const isShabbat = (dayCount === 8 || dayCount === 15 || dayCount === 22 || dayCount === 29);

            return { year: estimatedYear, month: monthIndex, day: dayCount, isNewMoon, isShabbat };
        }

        function getGregorianFromScriptural(year, month, day) {
            let yearStart = getYearStartDate(year);
            for (let m = 1; m < month; m++) {
                let monthLen = getMonthLength(m, year);
                yearStart.setDate(yearStart.getDate() + monthLen);
            }
            let targetMonthLen = getMonthLength(month, year);
            let validDay = Math.min(day, targetMonthLen);
            yearStart.setDate(yearStart.getDate() + (validDay - 1));
            yearStart.setHours(12,0,0,0);
            return yearStart;
        }

        // --- INITIALIZATION ---
        window.onload = function() {
            try {
                // 1. Detect Language
                const userLang = navigator.language || navigator.userLanguage; 
                if (userLang.startsWith('pt')) currentLang = 'pt';
                else if (userLang.startsWith('es')) currentLang = 'es';
                else if (userLang.startsWith('de')) currentLang = 'de';
                else if (userLang.startsWith('fr')) currentLang = 'fr';
                else if (userLang.startsWith('it')) currentLang = 'it';
                else if (userLang.startsWith('he')) currentLang = 'he';
                else if (userLang.startsWith('ar')) currentLang = 'ar';
                else if (userLang.startsWith('ru')) currentLang = 'ru';
                else if (userLang.startsWith('zh')) currentLang = 'zh';
                else if (userLang.startsWith('ja')) currentLang = 'ja';
                else if (userLang.startsWith('ko')) currentLang = 'ko';
                else if (userLang.startsWith('sw')) currentLang = 'sw';
                else if (userLang.startsWith('yo')) currentLang = 'yo';
                else currentLang = 'en';

                changeLanguage(currentLang);

                const today = new Date();
                const dd = String(today.getDate()).padStart(2, '0');
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const yyyy = today.getFullYear();
                document.getElementById('gregorian-date').value = `${yyyy}-${mm}-${dd}`;
                
                const select = document.getElementById('year-select');
                const currentActiveYear = findCurrentActiveYear(today);
                
                for (let y = 1; y <= 8000; y++) {
                    const option = document.createElement("option");
                    option.value = y;
                    const gregorianRange = getGregorianRange(y);
                    option.text = `${y} (${gregorianRange})`;
                    if (y === currentActiveYear) option.selected = true; 
                    select.appendChild(option);
                }

                convertDate();
                calculateFeastsForYear();

            } catch (e) {
                console.error(e);
                document.getElementById('result-display').innerHTML = "<p style='color:red'>Startup Error: " + e.message + "</p>";
            }
        };

        function addDays(date, days) {
            const result = new Date(date);
            result.setDate(result.getDate() + days);
            return result;
        }

        function formatDate(d) {
            // Use Intl.DateTimeFormat for robust localization
            try {
                return d.toLocaleDateString(currentLang, { month: 'short', day: 'numeric', year: 'numeric' });
            } catch (e) {
                return d.toLocaleDateString(); // Fallback
            }
        }
        
        function formatWeekdayDate(d) {
            // Specifically for the "Pagan Date" line to include Weekday (localized)
            try {
                 return d.toLocaleDateString(currentLang, { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
            } catch (e) {
                 return d.toLocaleDateString();
            }
        }

        function getGregorianRange(scriptYear) {
            const startDate = getYearStartDate(scriptYear);
            const startYear = startDate.getFullYear();
            return `${startYear}/${startYear + 1}`;
        }

        function findCurrentActiveYear(today) {
            if (today >= ANCHOR_YEAR_6001) return 6001;
            if (today >= ANCHOR_YEAR_6000) return 6000;
            let y = 6000;
            while(getYearStartDate(y + 1) <= today) y++;
            return y;
        }

        function convertDate() {
            const input = document.getElementById('gregorian-date');
            if (!input.value) return;
            const parts = input.value.split('-');
            const dateObj = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
            const result = getScripturalDate(dateObj);
            const resultDiv = document.getElementById('result-display');
            const T = translations[currentLang] || translations['en'];

            let statusHtml = "";
            if (result.isNewMoon) {
                statusHtml = `<span class="alert-title text-red">${T.status_new_moon}</span><span class="status-subtitle-red">${T.status_mandatory}</span>`;
            } else if (result.isShabbat) {
                statusHtml = `<span class="alert-title text-red">${T.status_shabbat}</span><span class="status-subtitle-red">${T.status_mandatory}</span>`;
            } else {
                statusHtml = `<span class="alert-title text-green">${T.status_regular}</span><span class="status-subtitle">${T.status_work_day}</span>`;
            }

            // LOCALIZED DATE STRING (Weekday + Date)
            const localizedDateStr = formatWeekdayDate(dateObj);

            resultDiv.innerHTML = `
                <p>${T.pagan_date}: ${localizedDateStr}</p>
                <hr style="border-color: #333;">
                <p>${T.scr_year}: <span class="highlight">${result.year}</span></p>
                <p>${T.scr_month}: <span class="highlight">${result.month}</span></p>
                <p>${T.scr_day}: <span class="highlight">${result.day}</span></p>
                <hr style="border-color: #333;">
                <div>${statusHtml}</div>
            `;
        }

        function calculateAge() {
            const input = document.getElementById('birth-date');
            const resultDiv = document.getElementById('age-result-display');
            const T = translations[currentLang] || translations['en'];
            
            if (!input.value) {
                resultDiv.innerHTML = `<p style='color:red'>${T.lbl_birth_date}</p>`;
                return;
            }

            const parts = input.value.split('-');
            const birthDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
            let today = new Date();
            
            birthDate.setHours(12,0,0,0);
            today.setHours(12,0,0,0);

            if (birthDate > today) {
                resultDiv.innerHTML = "<p style='color:red'>Birth date cannot be in the future.</p>";
                return;
            }

            const birthSD = getScripturalDate(birthDate);
            let birthStatus = "";
            if (birthSD.isNewMoon) birthStatus = `<span class='text-red'>${T.status_new_moon}</span>`;
            else if (birthSD.isShabbat) birthStatus = `<span class='text-red'>${T.status_shabbat}</span>`;
            else birthStatus = `<span class='text-green'>${T.status_work_day}</span>`;

            let years = 0;
            let months = 0;
            let days = 0;
            
            let currentSD = { ...birthSD };
            let currentGregorian = new Date(birthDate);

            while(true) {
                let nextBirthdaySD = { year: currentSD.year + 1, month: birthSD.month, day: birthSD.day };
                let nextBirthday = getGregorianFromScriptural(nextBirthdaySD.year, nextBirthdaySD.month, nextBirthdaySD.day);
                if (nextBirthday <= today) {
                    years++;
                    currentSD = nextBirthdaySD;
                    currentGregorian = nextBirthday;
                } else { break; }
            }

            let monthSafety = 0;
            while(monthSafety < 14) {
                monthSafety++;
                let nextMonthSD = { ...currentSD };
                nextMonthSD.month++;
                let maxMonth = isLeapYear(nextMonthSD.year) ? 13 : 12;
                if (nextMonthSD.month > maxMonth) {
                    nextMonthSD.month = 1;
                    nextMonthSD.year++;
                }
                let nextMonthDate = getGregorianFromScriptural(nextMonthSD.year, nextMonthSD.month, nextMonthSD.day);
                if (nextMonthDate <= today) {
                    months++;
                    currentSD = nextMonthSD;
                    currentGregorian = nextMonthDate;
                } else { break; }
            }

            let diffTime = Math.abs(today - currentGregorian);
            days = Math.floor(diffTime / (1000 * 60 * 60 * 24));

            let nextBirthdaySD = { year: birthSD.year + years + 1, month: birthSD.month, day: birthSD.day };
            let nextBirthdayGreg = getGregorianFromScriptural(nextBirthdaySD.year, nextBirthdaySD.month, nextBirthdaySD.day);

            resultDiv.innerHTML = `
                <div style="margin-bottom: 1rem;">
                    <p style="font-size: 0.9rem; color: #aaa;">${T.age_born_on}</p>
                    <p style="font-size: 1.1rem;">
                        ${T.scr_year} <span class="highlight">${birthSD.year}</span>, 
                        ${T.scr_month} <span class="highlight">${birthSD.month}</span>, 
                        ${T.scr_day} <span class="highlight">${birthSD.day}</span>
                    </p>
                    <p>Status: ${birthStatus}</p>
                </div>
                <hr style="border-color: #333;">
                <p style="font-size: 1.1rem; margin-top: 1rem;">${T.age_your_age}</p>
                <div class="age-result-row">
                    <span class="age-label">${T.years}:</span>
                    <span class="age-value">${years}</span>
                </div>
                <div class="age-result-row">
                    <span class="age-label">${T.months}:</span>
                    <span class="age-value">${months}</span>
                </div>
                <div class="age-result-row">
                    <span class="age-label">${T.days}:</span>
                    <span class="age-value">${days}</span>
                </div>
                <hr style="border-color: #333; margin-top: 1rem;">
                <div style="margin-top: 1rem;">
                    <p style="font-size: 0.9rem; color: #aaa;">${T.next_cycle} (${years + 1}):</p>
                    <p class="text-blue" style="font-size: 1.1rem; font-weight: bold;">
                        ${formatDate(nextBirthdayGreg)}
                    </p>
                </div>
            `;
        }

        function calculateFeastsForYear() {
            const targetYear = parseInt(document.getElementById('year-select').value);
            const tableBody = document.getElementById('feast-table-container');
            const headerDiv = document.getElementById('feast-year-header');
            const today = new Date();
            today.setHours(12,0,0,0);
            const T = translations[currentLang] || translations['en'];

            const gregorianRange = getGregorianRange(targetYear);
            headerDiv.innerHTML = `${T.scr_year}: <span class="highlight">${targetYear}</span><br>
            <span style="font-size:0.8rem; color:#888;">${gregorianRange}</span>`;

            const getFeastDate = (scriptYear, feastOffset) => {
                const yearStart = getYearStartDate(scriptYear);
                return addDays(yearStart, feastOffset);
            };

            const feasts = [
                { key: "new_year", offset: 0, isRange: false, ref: "Exodus 12:2", mandatory: false },
                { key: "pesach", offset: 13, isRange: false, ref: "Leviticus 23:5", mandatory: true },
                { key: "ub", offset: 14, isRange: true, endOffset: 20, ref: "Leviticus 23:6-8", mandatory: true },
                { key: "bikkurim", offset: 16, isRange: false, ref: "Leviticus 23:9-14", mandatory: true },
                { key: "shavuot", offset: 16 + 50, isRange: false, ref: "Leviticus 23:15-21", mandatory: true },
                { key: "teruah", offset: 177, isRange: false, ref: "Leviticus 23:24-25", mandatory: true },
                { key: "kippur", offset: 177 + 9, isRange: false, ref: "Leviticus 23:27-32", mandatory: true },
                { key: "sukkot", offset: 177 + 14, isRange: true, endOffset: 177 + 21, ref: "Leviticus 23:34-36", mandatory: true }
            ];

            let html = "";

            feasts.forEach(feast => {
                let dateThisYear = getFeastDate(targetYear, feast.offset);
                let dateDisplayPast, dateDisplayFuture;

                if (dateThisYear < today) {
                    dateDisplayPast = dateThisYear;
                    dateDisplayFuture = getFeastDate(targetYear + 1, feast.offset);
                } else {
                    dateDisplayFuture = dateThisYear;
                    dateDisplayPast = getFeastDate(targetYear - 1, feast.offset);
                }

                let pastStr = formatDate(dateDisplayPast);
                let futureStr = formatDate(dateDisplayFuture);

                if (feast.isRange) {
                    let endPast = getFeastDate(targetYear - 1, feast.endOffset);
                    let endFuture = getFeastDate(targetYear + 1, feast.endOffset);
                    if (dateThisYear < today) { endPast = getFeastDate(targetYear, feast.endOffset); } 
                    else { endFuture = getFeastDate(targetYear, feast.endOffset); }
                    pastStr = `${formatDate(dateDisplayPast)} - ${formatDate(endPast)}`;
                    futureStr = `${formatDate(dateDisplayFuture)} - ${formatDate(endFuture)}`;
                }

                const statusText = feast.mandatory 
                    ? `<span class="mandatory-status">${T.status_mandatory}</span>` 
                    : `<span class="memorial-status">${T.status_memorial}</span>`;

                html += `
                <tr>
                    <td class="feast-row-header" colspan="2">${T.feasts[feast.key]}</td>
                </tr>
                <tr class="feast-row-info">
                    <td colspan="2">${feast.ref} | ${statusText}</td>
                </tr>
                <tr>
                    <td class="col-past">
                        <span class="label-past">${T.previous}</span>
                        <span class="date-text">${pastStr}</span>
                    </td>
                    <td class="col-future">
                        <span class="label-future">${T.next}</span>
                        <span class="date-text">${futureStr}</span>
                    </td>
                </tr>
                `;
            });

            tableBody.innerHTML = html;
        }
    </script>
